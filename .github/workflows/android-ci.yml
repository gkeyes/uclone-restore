name: Android CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  assemble:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      HAS_RELEASE_SIGNING: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' && secrets.RELEASE_STORE_PASSWORD != '' && secrets.RELEASE_KEY_ALIAS != '' && secrets.RELEASE_KEY_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Decode release keystore
        if: env.HAS_RELEASE_SIGNING == 'true'
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/uclone-signing"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/uclone-signing/release.p12"
          echo "RELEASE_KEYSTORE_PATH=$RUNNER_TEMP/uclone-signing/release.p12" >> "$GITHUB_ENV"
          echo "RELEASE_STORE_TYPE=pkcs12" >> "$GITHUB_ENV"

      - name: Run unit tests
        run: gradle --no-daemon :app:testReleaseUnitTest

      - name: Assemble fixed-signed release APK
        if: env.HAS_RELEASE_SIGNING == 'true'
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: gradle --no-daemon :app:assembleRelease

      - name: Assemble debug APK fallback
        if: env.HAS_RELEASE_SIGNING != 'true'
        run: gradle --no-daemon :app:assembleDebug

      - name: Upload fixed-signed release APK
        if: env.HAS_RELEASE_SIGNING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: uclone-restore-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload debug APK fallback
        if: env.HAS_RELEASE_SIGNING != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: uclone-restore-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
